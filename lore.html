<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#050511] h-full">
<head>
    <link rel="icon" type="image/png" href="/ryuten-icon.png?v=1">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ryutenhoshi.com/lore.html">
    <meta property="og:title" content="RyuTenHoshi | Lore Archive">
    <meta property="og:description" content="The historical record and celestial archives of the Star-Soul multiverse.">
    <meta property="og:image" content="https://ryutenhoshi.com/banner.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyuTenHoshi — Lore Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
                space: '#050511',
                card: 'rgba(15, 23, 42, 0.4)',
                cyan: { 400: '#22d3ee', 500: '#06b6d4' },
                celestial: '#d8c196',
                purple: { 400: '#c084fc', 500: '#a855f7', 950: '#3b0764' }
            },
            fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
          }
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100%; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050511; }
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d8c196; }
        
        .lore-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
        }
        .lore-item.active .lore-content {
            max-height: 3000px;
            transition: max-height 0.5s cubic-bezier(1, 0, 1, 0);
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center p-4 md:p-8 box-border">

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 overflow-hidden">
        <div class="absolute top-[30%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1000px] h-[500px] bg-purple-900/10 rounded-[100%] blur-[130px]"></div>
        <div class="absolute bottom-[10%] left-1/3 w-[600px] h-[600px] bg-[#d8c196]/10 rounded-full blur-[140px]"></div>
    </div>
    <canvas id="star-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-80"></canvas>

    <header class="w-full max-w-3xl flex justify-between items-center shrink-0 mb-8 border-b border-slate-900/60 pb-4 z-10">
        <a href="index.html" class="font-bold tracking-widest uppercase text-white text-sm hover:text-celestial transition duration-200">
            ← RYU<span class="text-celestial">TEN</span>HOSHI
        </a>
        <span class="text-xs font-mono text-slate-500 uppercase tracking-widest">Archival Terminal</span>
    </header>

    <main class="w-full max-w-3xl flex-1 flex flex-col z-10">
        
        <section class="mb-8 shrink-0">
            <h1 class="text-3xl font-black uppercase tracking-tight text-white mb-2">The Star-Soul Chronicles</h1>
            <p class="text-xs text-slate-400 font-light mb-6">Traversing history, grinding down fractured worlds, and compiling data logs.</p>
            
            <div class="relative w-full">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="SEARCH CHAPTERS OR KEYWORDS (E.G., TESTING, GROUNDS)..." 
                    class="w-full bg-card/60 backdrop-blur-md border border-indigo-900/40 text-white rounded-xl py-3 px-4 pl-11 text-xs font-mono tracking-wider focus:outline-none focus:border-celestial/60 focus:ring-1 focus:ring-celestial/30 transition shadow-[0_0_20px_rgba(0,0,0,0.5)] uppercase placeholder-slate-600"
                    oninput="filterLore()"
                >
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
            </div>
        </section>

        <section id="lore-container" class="space-y-4 flex-1">
            
            <div class="lore-item bg-card/20 backdrop-blur-sm border border-indigo-900/20 rounded-xl transition duration-300 hover:border-indigo-900/50 overflow-hidden" data-keywords="testing grounds chapter 1 act 1">
                <button onclick="toggleLore(this.parentElement)" class="w-full text-left p-4 md:p-5 flex justify-between items-center gap-4 focus:outline-none select-none">
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-mono tracking-widest text-cyan-400 uppercase">Testing Grounds</span>
                        <h2 class="text-base md:text-lg font-bold text-white tracking-wide transition duration-200 label-title">Testing Grounds</h2>
                    </div>
                    <svg class="w-4 h-4 text-slate-500 shrink-0 transform transition-transform duration-300 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="lore-content">
                    <div class="px-4 pb-5 md:px-5 md:pb-6 space-y-4 text-slate-300 font-light text-sm leading-relaxed border-t border-indigo-900/10 pt-4">
                        <p>Testing grounds.</p>
                    </div>
                </div>
            </div>



            
            <div class="lore-item bg-card/20 backdrop-blur-sm border border-indigo-900/20 rounded-xl transition duration-300 hover:border-indigo-900/50 overflow-hidden" data-keywords="testing grounds chapter 2 act 1">
                <button onclick="toggleLore(this.parentElement)" class="w-full text-left p-4 md:p-5 flex justify-between items-center gap-4 focus:outline-none select-none">
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-mono tracking-widest text-purple-400 uppercase">Testing Grounds</span>
                        <h2 class="text-base md:text-lg font-bold text-white tracking-wide transition duration-200 label-title">Testing Grounds</h2>
                    </div>
                    <svg class="w-4 h-4 text-slate-500 shrink-0 transform transition-transform duration-300 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="lore-content">
                    <div class="px-4 pb-5 md:px-5 md:pb-6 space-y-4 text-slate-300 font-light text-sm leading-relaxed border-t border-indigo-900/10 pt-4">
                        <p>Testing grounds.</p>
                    </div>
                </div>
            </div>




            
            <div class="lore-item bg-card/20 backdrop-blur-sm border border-indigo-900/20 rounded-xl transition duration-300 hover:border-indigo-900/50 overflow-hidden" data-keywords="testing grounds chapter 3 act 2">
                <button onclick="toggleLore(this.parentElement)" class="w-full text-left p-4 md:p-5 flex justify-between items-center gap-4 focus:outline-none select-none">
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-mono tracking-widest text-celestial uppercase">Testing Grounds</span>
                        <h2 class="text-base md:text-lg font-bold text-white tracking-wide transition duration-200 label-title">Testing Grounds</h2>
                    </div>
                    <svg class="w-4 h-4 text-slate-500 shrink-0 transform transition-transform duration-300 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="lore-content">
                    <div class="px-4 pb-5 md:px-5 md:pb-6 space-y-4 text-slate-300 font-light text-sm leading-relaxed border-t border-indigo-900/10 pt-4">
                        <p>Testing grounds.</p>
                    </div>
                </div>
            </div>




            
            <div id="no-results" class="hidden text-center py-12 border border-dashed border-indigo-900/20 rounded-xl bg-card/5">
                <p class="font-mono text-xs text-slate-500 uppercase tracking-widest">No matching records found in this cosmos.</p>
            </div>

        </section>

        <footer class="text-center shrink-0 pt-12 pb-4 mt-auto border-t border-slate-900/40">
            <p class="text-slate-600 text-[10px] font-mono uppercase tracking-widest">RyuTenHoshi | The Star-Soul Archive</p>
        </footer>

    </main>

    <script>
        // --- Real-time Filter Matrix Engine ---
        function filterLore() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const items = document.querySelectorAll('.lore-item');
            const noResults = document.getElementById('no-results');
            let foundAny = false;

            items.forEach(item => {
                const searchKeywords = item.getAttribute('data-keywords').toLowerCase();
                const titleText = item.querySelector('.label-title').textContent.toLowerCase();
                
                if (searchKeywords.includes(query) || titleText.includes(query)) {
                    item.classList.remove('hidden');
                    foundAny = true;
                } else {
                    item.classList.add('hidden');
                    item.classList.remove('active');
                    item.querySelector('.arrow-icon').classList.remove('-rotate-180');
                }
            });

            if (foundAny) {
                noResults.classList.add('hidden');
            } else {
                noResults.classList.remove('hidden');
            }
        }

        // --- Accordion Reveal Action ---
        function toggleLore(element) {
            const isOpen = element.classList.contains('active');
            const arrow = element.querySelector('.arrow-icon');
            
            if (isOpen) {
                element.classList.remove('active');
                arrow.classList.remove('-rotate-180');
            } else {
                element.classList.add('active');
                arrow.classList.add('-rotate-180');
            }
        }

        // --- Animated Canvas Space Background Effect ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let stars = [];
        const numStars = 150;

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.vx = (Math.random() - 0.5) * 0.4; 
                this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                
                this.alpha += (Math.random() - 0.5) * 0.05;
                if(this.alpha < 0.1) this.alpha = 0.1;
                if(this.alpha > 0.8) this.alpha = 0.8;
                this.draw();
            }
        }
        function initStars() { stars = []; for(let i=0; i<numStars; i++) stars.push(new Star()); }
        function animateStars() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(star => star.update()); requestAnimationFrame(animateStars); }
        
        initStars();
        animateStars();
    </script>
</body>
</html>
