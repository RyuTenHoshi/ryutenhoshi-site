    <button onclick="window.scrollTo(0,0)" id="scroll-top" class="fixed bottom-8 right-8 w-12 h-12 bg-space border border-celestial/30 rounded-full flex items-center justify-center text-celestial opacity-0 transition-opacity duration-300 z-50 hover:bg-slate-900 cursor-pointer shadow-[0_0_15px_rgba(216,193,150,0.15)]">

    </button>

    <script>
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; }
        
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const scrollTopBtn = document.getElementById('scroll-top');
            if (scrollPos > 500) { scrollTopBtn.classList.remove('opacity-0'); } 
            else { scrollTopBtn.classList.add('opacity-0'); }

            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scroll-progress").style.width = ((winScroll / height) * 100) + "%";
        });

        // --- Independent Drifting Star Canvas Effect ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let stars = [];
        const numStars = 200;

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.vx = (Math.random() - 0.5) * 0.4; 
                this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                
                this.alpha += (Math.random() - 0.5) * 0.05;
                if(this.alpha < 0.1) this.alpha = 0.1;
                if(this.alpha > 0.8) this.alpha = 0.8;
                this.draw();
            }
        }
        function initStars() { stars = []; for(let i=0; i<numStars; i++) stars.push(new Star()); }
        function animateStars() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(star => star.update()); requestAnimationFrame(animateStars); }
        
        initStars();
        animateStars();
    </script>
